<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Réservation de la voiture familiale — simple, rapide, gratuit.">
<meta name="theme-color" content="#ffffff">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
<title>FamCar — Réservation voiture familiale</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --text-light: #888888;
    --border: #e8e8e8;
    --accent: #2563eb;
    --accent-light: #eff4ff;
    --danger: #ef4444;
    --danger-light: #fef2f2;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- HEADER ---- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(16px);
    z-index: 100;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--text);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 16px;
  }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px 6px 6px;
    border-radius: 100px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    background: white;
    font-size: 14px;
    font-weight: 500;
  }

  .user-pill:hover { border-color: #ccc; box-shadow: var(--shadow-sm); }

  .user-pill .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    overflow: hidden;
  }

  .user-pill .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ---- MEMBER SELECTION ---- */
  .member-select {
    text-align: center;
    padding: 40px 20px;
    max-width: 520px;
    margin: 0 auto;
  }

  .member-select h2 {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .member-select p {
    color: var(--text-light);
    font-size: 15px;
    margin-bottom: 32px;
  }

  .member-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .member-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.15s;
    width: 80px;
  }

  .member-card:hover { transform: scale(1.05); }

  .member-card .member-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 600;
    overflow: hidden;
    border: 3px solid transparent;
    transition: border 0.15s;
  }

  .member-card:hover .member-avatar { border-color: var(--accent); }

  .member-card .member-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .member-card .member-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .add-member-card .member-avatar {
    background: #f0f0f0;
    color: var(--text-light);
    font-size: 28px;
    border: 2px dashed #ddd;
  }

  .add-member-card:hover .member-avatar {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ---- MAIN ---- */
  main {
    max-width: 520px;
    margin: 0 auto;
    padding: 32px 20px 100px;
  }

  /* ---- MONTH NAV ---- */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .month-title {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.5px;
    text-transform: capitalize;
  }

  .month-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.15s;
    color: var(--text);
  }

  .month-btn:hover { background: #f5f5f5; }

  /* ---- CALENDAR GRID ---- */
  .cal-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    padding: 0 2px;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-day {
    height: 56px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    border: 2px solid transparent;
    overflow: hidden;
  }

  .cal-day:hover:not(.empty):not(.past) { background: #f7f7f7; }

  .cal-day.empty { cursor: default; }

  .cal-day.today {
    font-weight: 600;
    border-color: var(--text);
  }

  .cal-day.past {
    color: #ccc;
    cursor: default;
  }

  .cal-day.booked {
    background: var(--accent-light);
    border-color: var(--accent);
    cursor: pointer;
  }

  .cal-day .booking-avatar {
    position: absolute;
    bottom: 3px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 7px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  .cal-day .booking-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .cal-day.mine .booking-avatar { background: rgba(255,255,255,0.35); }

  .cal-day.mine {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .day-num { line-height: 1; }

  .cal-day.weekend { background: #fafafa; }
  .cal-day.weekend.booked { background: var(--accent-light); }
  .cal-day.weekend.mine { background: var(--accent); }

  /* ---- MODAL / BOTTOM SHEET ---- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    opacity: 0;
    visibility: hidden;
    transition: all 0.25s;
  }

  .overlay.open { opacity: 1; visibility: visible; }

  .sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 28px 24px 40px;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-width: 520px;
    margin: 0 auto;
  }

  .overlay.open .sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: #ddd;
    border-radius: 4px;
    margin: 0 auto 20px;
  }

  .sheet-date {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 6px;
    text-transform: capitalize;
  }

  .sheet-status {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 24px;
  }

  .sheet-status .booked-by {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    padding: 12px;
    background: #f8f8f8;
    border-radius: 12px;
  }

  .sheet-status .booked-by .avatar-lg {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 600;
    overflow: hidden;
    flex-shrink: 0;
  }

  .avatar-lg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .sheet-status .booked-by .info {
    font-size: 15px;
    color: var(--text);
    font-weight: 500;
  }

  .sheet-status .booked-by .info small {
    display: block;
    font-weight: 400;
    color: var(--text-light);
    font-size: 13px;
  }

  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary { background: var(--text); color: white; }
  .btn-primary:hover { background: #333; }

  .btn-danger { background: var(--danger-light); color: var(--danger); }
  .btn-danger:hover { background: #fee2e2; }

  .btn + .btn { margin-top: 10px; }

  /* ---- LOGIN / SIGNUP SHEET ---- */
  .login-sheet { text-align: center; }

  .login-sheet h2 {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .login-sheet p {
    color: var(--text-light);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .input-group {
    margin-bottom: 14px;
    text-align: left;
  }

  .input-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-light);
    margin-bottom: 6px;
  }

  .input-group input, .input-group select {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border 0.15s;
    background: white;
  }

  .input-group input:focus, .input-group select:focus { border-color: var(--accent); }

  .photo-upload {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    margin-top: 4px;
  }

  .photo-preview {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #bbb;
    overflow: hidden;
    flex-shrink: 0;
    border: 2px dashed #ddd;
    cursor: pointer;
    transition: all 0.15s;
  }

  .photo-preview:hover { border-color: var(--accent); }

  .photo-preview img { width: 100%; height: 100%; object-fit: cover; }

  .photo-preview.has-photo { border-style: solid; border-color: var(--accent); }

  .photo-label { font-size: 14px; color: var(--text-light); cursor: pointer; }
  .photo-label:hover { color: var(--accent); }

  #photo-input { display: none; }

  /* ---- CAR SELECTOR ---- */
  .car-selector {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
    padding: 4px;
    background: #f5f5f5;
    border-radius: 12px;
  }

  .car-tab {
    flex: 1;
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-light);
  }

  .car-tab.active {
    background: white;
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  /* ---- LEGEND ---- */
  .legend {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--text-light);
  }

  .legend span { display: flex; align-items: center; gap: 6px; }

  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* ---- TOAST ---- */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 14px 24px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 500;
    z-index: 300;
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: var(--shadow-lg);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ---- LOADING ---- */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: var(--text-light);
    font-size: 15px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 10px;
  }

  /* ---- LOCK SCREEN ---- */
  .lock-screen {
    position: fixed;
    inset: 0;
    background: white;
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s, visibility 0.4s;
  }

  .lock-screen.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .lock-box {
    text-align: center;
    padding: 24px;
    width: 100%;
    max-width: 320px;
  }

  .lock-box .lock-icon {
    width: 64px;
    height: 64px;
    background: #f5f5f5;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    margin: 0 auto 24px;
  }

  .lock-box h1 {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .lock-box p {
    color: var(--text-light);
    font-size: 15px;
    margin-bottom: 32px;
  }

  .pin-input {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .pin-input input {
    width: 52px;
    height: 60px;
    text-align: center;
    font-size: 24px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    border: 2px solid var(--border);
    border-radius: 14px;
    outline: none;
    transition: border 0.15s;
    background: #fafafa;
    -moz-appearance: textfield;
  }

  .pin-input input::-webkit-outer-spin-button,
  .pin-input input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .pin-input input:focus { border-color: var(--text); background: white; }

  .pin-input input.error {
    border-color: var(--danger);
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .lock-error {
    color: var(--danger);
    font-size: 14px;
    margin-top: -16px;
    margin-bottom: 16px;
    min-height: 20px;
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 480px) {
    header { padding: 16px 18px; }
    main { padding: 24px 14px 100px; }
    .month-title { font-size: 22px; }
    .cal-day { height: 48px; font-size: 13px; border-radius: 10px; }
  }
</style>
</head>
<body>

<!-- Lock Screen -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <h1>FamCar</h1>
    <p>Entrez le code familial</p>
    <div class="pin-input" id="pin-input">
      <input type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
      <input type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
      <input type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
      <input type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
    </div>
    <div class="lock-error" id="lock-error"></div>
    <button class="btn btn-primary" onclick="checkPin()">Entrer</button>
  </div>
</div>

<header>
  <div class="logo">
    <div class="logo-icon">🚗</div>
    FamCar
  </div>
  <div class="user-pill" id="user-pill" onclick="showLogin()" style="display:none;">
    <div class="avatar" id="header-avatar"></div>
    <span id="header-name"></span>
  </div>
</header>

<!-- Member selection screen -->
<div class="member-select" id="member-select" style="display:none;">
  <h2>Qui conduit ?</h2>
  <p>Sélectionnez votre profil</p>
  <div class="member-grid" id="member-grid"></div>
</div>

<main style="display:none;">
  <!-- Car selector (extensible) -->
  <div class="car-selector" id="car-selector" style="display:none;"></div>

  <!-- Month navigation -->
  <div class="month-nav">
    <button class="month-btn" onclick="prevMonth()">‹</button>
    <div class="month-title" id="month-title"></div>
    <button class="month-btn" onclick="nextMonth()">›</button>
  </div>

  <!-- Calendar header -->
  <div class="cal-header">
    <div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div>
  </div>

  <!-- Calendar grid -->
  <div class="cal-grid" id="cal-grid">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div> Chargement...</div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <span><span class="legend-dot" style="background:var(--accent)"></span> Ma résa</span>
    <span><span class="legend-dot" style="background:var(--accent-light);border:1px solid var(--accent)"></span> Réservé</span>
    <span><span class="legend-dot" style="background:#f0f0f0"></span> Dispo</span>
  </div>
</main>

<!-- Overlay for sheets -->
<div class="overlay" id="overlay" onclick="closeSheet()">
  <div class="sheet" id="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div id="sheet-content"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==========================================
// FIREBASE CONFIG
// ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyCf-3Gpbx8FacaeXiwvfSuhsaOJxv2FHTw",
  authDomain: "famcar-e2bb3.firebaseapp.com",
  projectId: "famcar-e2bb3",
  storageBucket: "famcar-e2bb3.firebasestorage.app",
  messagingSenderId: "349994619294",
  appId: "1:349994619294:web:715e9d592c4b2fc025468f",
  measurementId: "G-B9MYJGRNJ1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==========================================
// STATE
// ==========================================
let currentUser = JSON.parse(localStorage.getItem('famcar_user') || 'null');
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let bookings = {};
let cars = [];
let selectedCar = null;
let unsubscribe = null;

// ==========================================
// CARS MANAGEMENT
// ==========================================
async function loadCars() {
  try {
    const snap = await db.collection('cars').orderBy('name').get();
    cars = [];
    snap.forEach(doc => cars.push({ id: doc.id, ...doc.data() }));

    if (cars.length === 0) {
      const ref = await db.collection('cars').add({ name: 'Voiture familiale', emoji: '🚗' });
      cars = [{ id: ref.id, name: 'Voiture familiale', emoji: '🚗' }];
    }

    selectedCar = cars[0].id;
    renderCarSelector();
    subscribeBookings();
  } catch (e) {
    console.error('Firebase error:', e);
    document.getElementById('cal-grid').innerHTML =
      '<div class="loading" style="flex-direction:column;gap:8px;color:var(--danger)">⚠️ Impossible de se connecter à la base de données.<br><small style="color:var(--text-light)">Vérifiez votre connexion ou la configuration Firebase.</small></div>';
  }
}

function renderCarSelector() {
  const el = document.getElementById('car-selector');
  if (cars.length <= 1) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = cars.map(c =>

// ==========================================
// BOOKINGS (REAL-TIME)
// ==========================================
function subscribeBookings() {
  if (unsubscribe) unsubscribe();
  unsubscribe = db.collection('bookings')
    .where('carId', '==', selectedCar)
    .onSnapshot(snap => {
      bookings = {};
      snap.forEach(doc => {
        const d = doc.data();
        bookings[d.date] = { id: doc.id, ...d };
      });
      renderCalendar();
    });
}

// ==========================================
// MEMBER COLORS
// ==========================================
const MEMBER_COLORS = [
  '#2563eb', '#7c3aed', '#db2777', '#ea580c', '#16a34a',
  '#0891b2', '#4f46e5', '#c026d3', '#d97706', '#059669'
];

function getUserColor(userId) {
  let hash = 0;
  for (let i = 0; i < userId.length; i++) {
    hash = ((hash << 5) - hash) + userId.charCodeAt(i);
  }
  return MEMBER_COLORS[Math.abs(hash) % MEMBER_COLORS.length];
}

// ==========================================
// CALENDAR RENDER
// ==========================================
function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  const titleEl = document.getElementById('month-title');

  const date = new Date(currentYear, currentMonth, 1);
  titleEl.textContent = date.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });

  let firstDay = date.getDay() - 1;
  if (firstDay < 0) firstDay = 6;

  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  let html = '';

  for (let i = 0; i < firstDay; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cellDate = new Date(currentYear, currentMonth, d);
    const dayOfWeek = cellDate.getDay();
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
    const isToday = cellDate.getTime() === today.getTime();
    const isPast = cellDate < today;
    const booking = bookings[dateStr];
    const isMine = booking && currentUser && booking.userId === currentUser.id;

    let classes = ['cal-day'];
    if (isWeekend) classes.push('weekend');
    if (isToday) classes.push('today');
    if (isPast) classes.push('past');
    if (booking && isMine) classes.push('mine');
    else if (booking) classes.push('booked');

    let avatarHtml = '';
    if (booking) {
      const avatarColor = getUserColor(booking.userId);
      if (booking.photo) {
        avatarHtml = `<div class="booking-avatar" style="background:${avatarColor}"><img src="${booking.photo}" alt=""></div>`;
      } else {
        avatarHtml = `<div class="booking-avatar" style="background:${avatarColor}">${getInitials(booking.userName)}</div>`;
      }
    }

    const todayLabel = isToday ? `<span style="font-size:8px;opacity:0.55;line-height:1">auj.</span>` : '';

    html += `<div class="${classes.join(' ')}" onclick="onDayClick('${dateStr}', ${isPast})">
      <span class="day-num" style="${booking ? 'margin-top:-4px' : ''}">${d}</span>
      ${todayLabel}
      ${avatarHtml}
    </div>`;
  }

  // Toujours 42 cellules (6 lignes × 7) — hauteur fixe quel que soit le mois
  const remaining = 42 - (firstDay + daysInMonth);
  for (let i = 0; i < remaining; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  grid.innerHTML = html;
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
}

// ==========================================
// DAY CLICK → SHEET
// ==========================================
function onDayClick(dateStr, isPast) {
  if (isPast) return;

  const booking = bookings[dateStr];
  const date = new Date(dateStr + 'T00:00:00');
  const prettyDate = date.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

  let html = '';

  if (booking) {
    const isMine = currentUser && booking.userId === currentUser.id;
    const avatarContent = booking.photo
      ? `<img src="${booking.photo}" alt="">`
      : getInitials(booking.userName);

    html = `
      <div class="sheet-date">${prettyDate}</div>
      <div class="sheet-status">
        <div class="booked-by">
          <div class="avatar-lg">${avatarContent}</div>
          <div class="info">
            ${booking.userName}
            <small>${isMine ? 'Votre réservation' : 'A réservé ce jour'}</small>
          </div>
        </div>
      </div>
      ${isMine ? `<button class="btn btn-danger" onclick="cancelBooking('${booking.id}')">Annuler ma réservation</button>` : ''}
      <button class="btn" style="background:#f5f5f5;color:var(--text)" onclick="closeSheet()">Fermer</button>
    `;
  } else {
    if (!currentUser) {
      html = `
        <div class="sheet-date">${prettyDate}</div>
        <div class="sheet-status">Jour disponible</div>
        <button class="btn btn-primary" onclick="closeSheet(); showMemberSelect();">Se connecter pour réserver</button>
      `;
    } else {
      // Bouton week-end (vendredi → sam+dim, samedi → dim)
      const clickedDate = new Date(dateStr + 'T00:00:00');
      const dow = clickedDate.getDay();
      let weekendBtn = '';
      if (dow === 5 || dow === 6) {
        const sat = new Date(clickedDate);
        const sun = new Date(clickedDate);
        if (dow === 5) { sat.setDate(sat.getDate() + 1); sun.setDate(sun.getDate() + 2); }
        if (dow === 6) { sun.setDate(sun.getDate() + 1); }
        const satStr = sat.toISOString().split('T')[0];
        const sunStr = sun.toISOString().split('T')[0];
        if (!bookings[satStr] && !bookings[sunStr]) {
          weekendBtn = `<button class="btn" style="background:var(--accent-light);color:var(--accent)" onclick="bookWeekend('${satStr}','${sunStr}')">Réserver le week-end</button>`;
        }
      }

      html = `
        <div class="sheet-date">${prettyDate}</div>
        <div class="sheet-status">✅ Jour disponible</div>
        <button class="btn btn-primary" onclick="book('${dateStr}')">Réserver ce jour</button>
        ${weekendBtn}
        <button class="btn" style="background:#f5f5f5;color:var(--text)" onclick="closeSheet()">Annuler</button>
      `;
    }
  }

  document.getElementById('sheet-content').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}

// ==========================================
// BOOK / CANCEL
// ==========================================
async function book(dateStr) {
  if (!currentUser) return;

  try {
    const existing = await db.collection('bookings')
      .where('carId', '==', selectedCar)
      .where('date', '==', dateStr)
      .get();

    if (!existing.empty) {
      closeSheet();
      showToast('Ce jour vient d\'être réservé');
      return;
    }

    await db.collection('bookings').add({
      carId: selectedCar,
      date: dateStr,
      userId: currentUser.id,
      userName: currentUser.name,
      photo: currentUser.photo || null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    closeSheet();
    showToast('Réservation confirmée ✓');
  } catch (e) {
    showToast('Erreur — réessayez');
  }
}

async function cancelBooking(bookingId) {
  try {
    await db.collection('bookings').doc(bookingId).delete();
    closeSheet();
    showToast('Réservation annulée');
  } catch (e) {
    showToast('Erreur — réessayez');
  }
}

async function bookWeekend(satStr, sunStr) {
  if (!currentUser) return;
  try {
    const batch = db.batch();
    const ref1 = db.collection('bookings').doc();
    const ref2 = db.collection('bookings').doc();
    const data = {
      carId: selectedCar,
      userId: currentUser.id,
      userName: currentUser.name,
      photo: currentUser.photo || null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    batch.set(ref1, { ...data, date: satStr });
    batch.set(ref2, { ...data, date: sunStr });
    await batch.commit();
    closeSheet();
    showToast('Week-end réservé ✓');
  } catch (e) {
    showToast('Erreur — réessayez');
  }
}

async function verifyMemberPin(userId) {
  const inputs = document.querySelectorAll('#member-pin-input input');
  const pin = Array.from(inputs).map(i => i.value.replace(/\D/g, '')).join('');

  if (pin.length < 4) {
    document.getElementById('member-pin-error').textContent = 'Entrez les 4 chiffres';
    return;
  }

  try {
    const doc = await db.collection('users').doc(userId).get();
    if (!doc.exists) {
      document.getElementById('member-pin-error').textContent = 'Utilisateur introuvable';
      return;
    }

    const data = doc.data();
    if (String(data.pin) === pin) {
      currentUser = { id: userId, name: data.name, email: data.email, photo: data.photo || null };
      localStorage.setItem('famcar_user', JSON.stringify(currentUser));
      closeSheet();
      enterApp();
      showToast(`Bonjour ${currentUser.name} !`);
    } else {
      document.getElementById('member-pin-error').textContent = 'Code incorrect';
      inputs.forEach(i => { i.value = ''; i.classList.add('error'); });
      inputs[0].focus();
      setTimeout(() => inputs.forEach(i => i.classList.remove('error')), 600);
    }
  } catch (e) {
    document.getElementById('member-pin-error').textContent = 'Erreur de connexion';
  }
}

// ==========================================
// PHOTO UPLOAD
// ==========================================
function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const size = 120;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const min = Math.min(img.width, img.height);
      const sx = (img.width - min) / 2;
      const sy = (img.height - min) / 2;
      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
      tempPhoto = canvas.toDataURL('image/jpeg', 0.6);
      const preview = document.getElementById('photo-preview');
      preview.innerHTML = `<img src="${tempPhoto}" alt="">`;
      preview.classList.add('has-photo');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

  const inputs = document.querySelectorAll('#pin-input input');
  const pin = Array.from(inputs).map(i => i.value.replace(/\D/g, '')).join('');

  if (pin.length < 4) { showPinError('Entrez les 4 chiffres'); return; }

  try {
    const doc = await db.collection('config').doc('access').get();

    if (!doc.exists) {
      try {
        await db.collection('config').doc('access').set({ pin });
      } catch(writeErr) {
        console.log('Could not auto-create PIN (read-only rules?)', writeErr);
      }
      unlockApp();
      return;
    }

    if (pin === String(doc.data().pin)) {
      unlockApp();
    } else {
      showPinError('Code incorrect');
      inputs.forEach(i => { i.value = ''; i.classList.add('error'); });
      inputs[0].focus();
      setTimeout(() => inputs.forEach(i => i.classList.remove('error')), 600);
    }
  } catch (e) {
    console.error('PIN check error:', e);
    showPinError('Erreur de connexion — vérifiez Firestore');
  }
}

function showPinError(msg) {
  document.getElementById('lock-error').textContent = msg;
}

function unlockApp() {
  isUnlocked = true;
  localStorage.setItem('famcar_unlocked', 'true');
  document.getElementById('lock-screen').classList.add('hidden');
  if (currentUser) {
    enterApp();
  } else {
    showMemberSelect();
  }
}

// ==========================================
// INIT
// ==========================================
loadCars(); // Charger les voitures en arrière-plan

if (isUnlocked && currentUser) {
  document.getElementById('lock-screen').classList.add('hidden');
  enterApp();
} else if (isUnlocked && !currentUser) {
  document.getElementById('lock-screen').classList.add('hidden');
  showMemberSelect();
} else {
  initLockScreen();
}

// Swipe gauche/droite pour changer de mois (mobile)
let touchStartX = 0;
document.getElementById('cal-grid').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('cal-grid').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 60) {
    if (diff > 0) prevMonth();
    else nextMonth();
  }
}, { passive: true });
</script>
